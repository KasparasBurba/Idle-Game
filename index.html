<body>
    <head>
        <button id="save">
            Save game
        </button>
        <button id="load">
            Load game
        </button>
        <button id="restart">
            Restart game
        </button>
        <label>
            <input type="checkbox" id="autoSave">
            Auto save
        </label>
    </head>
    <p>
        Coins: <span id="coins">0</span>
    </p>
    <button id="steal">Steal</button>
    <p>
        Coins per second: <span id="coinsPerSecond">0</span>
    </p>

    <button id="upgrade1Button">
        +1 per click
        <br>
        Cost: <span id="upgrade1Cost">10</span>
        <br>
        Amount: <span id="upgrade1Amount">0</span>
    </button>

    <button id="miner">
        +1 Miner (+1/s)
        <br>
        Cost: <span id="minerCost">50</span>
        <br>
        Amount: <span id="minerAmount">0</span>
    </button>

    <button id="tractor">
        +1 Tractor (+5/s)
        <br>
        Cost: <span id="tractorCost">200</span>
        <br>
        Amount: <span id="tractorAmount">0</span>
    </button>

    <button id="drill">
        +1 Drill (+20/s)
        <br>
        Cost: <span id="drillCost">500</span>
        <br>
        Amount: <span id="drillAmount">0</span>
    </button>
</body>
<script src="game.js"></script>
