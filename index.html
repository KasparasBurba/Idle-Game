<!DOCTYPE html>
<html lang="en">
<head>
    <title>Idle Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game">
        <header class="card header">
            <div>Coins: <span id="coins">0</span></div>
            <div>CpC: <span id="coinsPerClick">0</span></div>
            <div>CpS: <span id="coinsPerSecond">0</span></div>
        </header>

        <main class="game-layout">
            <section class="shop">
                <h2>Upgrades</h2>

                <button id="upgrade1" class="shop-button">
                    <span class="item-name">Double CPC</span>
                    <span class="item-info">Cost: <span id="upgrade1Cost">5</span></span>
                    <span class="item-info">Multi: <span id="upgrade1Multi">1</span></span>
                    <span class="item-info">Amount: <span id="upgrade1Amount">0</span></span>
                </button>
                <button id="upgrade2" class="shop-button">
                    <span class="item-name">Faster steal (-1s)</span>
                    <span class="item-info">Cost: <span id="upgrade2Cost">10</span></span>
                    <span class="item-info">Value: <span id="upgrade2Value">0</span></span>
                    <span class="item-info">Amount: <span id="upgrade2Amount">0</span></span>
                </button>
                <button id="upgrade3" class="shop-button">
                    <span class="item-name">Double CPS</span>
                    <span class="item-info">Cost: <span id="upgrade3Cost">20</span></span>
                    <span class="item-info">Multi: <span id="upgrade3Multi">1</span></span>
                    <span class="item-info">Amount: <span id="upgrade3Amount">0</span></span>
                </button>
                <button id="upgrade4" class="shop-button">
                    <span class="item-name">+10 base CPC</span>
                    <span class="item-info">Cost: <span id="upgrade4Cost">100</span></span>
                    <span class="item-info">Value: <span id="upgrade4Value">0</span></span>
                    <span class="item-info">Amount: <span id="upgrade4Amount">0</span></span>
                </button>
            </section>

            <section class="coin-section card">
                <button id="steal">Steal</button>
            </section>

            <section class="shop">
                <h2>Buildings</h2>

                <button id="building1" class="shop-button">
                    <span class="item-name">Miner</span>
                    <span id="building1Income" class="item-info">+1/s</span>
                    <span class="item-info">Cost: <span id="building1Cost">50</span></span>
                    <span class="item-info">Amount: <span id="building1Amount">0</span></span>
                </button>

                <button id="building2" class="shop-button">
                    <span class="item-name">Tractor</span>
                    <span id="building2Income" class="item-info">+5/s</span>
                    <span class="item-info">Cost: <span id="building2Cost">200</span></span>
                    <span class="item-info">Amount: <span id="building2Amount">0</span></span>
                </button>

                <button id="building3" class="shop-button">
                    <span class="item-name">Drill</span>
                    <span id="building3Income" class="item-info">+20/s</span>
                    <span class="item-info">Cost: <span id="building3Cost">500</span></span>
                    <span class="item-info">Amount: <span id="building3Amount">0</span></span>
                </button>
                
                <button id="building4" class="shop-button">
                    <span class="item-name">Factory</span>
                    <span id="building4Income" class="item-info">+100/s</span>
                    <span class="item-info">Cost: <span id="building4Cost">2500</span></span>
                    <span class="item-info">Amount: <span id="building4Amount">0</span></span>
                </button>

                <button id="building5" class="shop-button">
                    <span class="item-name">Bank</span>
                    <span id="building5Income" class="item-info">+500/s</span>
                    <span class="item-info">Cost: <span id="building5Cost">10000</span></span>
                    <span class="item-info">Amount: <span id="building5Amount">0</span></span>
                </button>

                <button id="building6" class="shop-button">
                    <span class="item-name">Data Center</span>
                    <span id="building6Income" class="item-info">+2500/s</span>
                    <span class="item-info">Cost: <span id="building6Cost">50000</span></span>
                    <span class="item-info">Amount: <span id="building6Amount">0</span></span>
                </button>

                <button id="building7" class="shop-button">
                    <span class="item-name">Nuclear Plant</span>
                    <span id="building7Income" class="item-info">+10,000/s</span>
                    <span class="item-info">Cost: <span id="building7Cost">250000</span></span>
                    <span class="item-info">Amount: <span id="building7Amount">0</span></span>
                </button>

                <button id="building8" class="shop-button">
                    <span class="item-name">Space station</span>
                    <span id="building8Income" class="item-info">+50,000/s</span>
                    <span class="item-info">Cost: <span id="building8Cost">1000000</span></span>
                    <span class="item-info">Amount: <span id="building8Amount">0</span></span>
                </button>
            </section>

            <section class="card stats">
                <h2>Statistics</h2>
                <p>Total coins earned: <span id="totalCoinsEarned">0</span></p>
                <p>Total clicks: <span id="totalClicks">0</span></p>
                <p>Time played: <span id="timePlayed">0</span></p>
            </section>
        </main>

        <footer class="card footer">
            <button id="save">Save game</button>
            <button id="load">Load game</button>
            <button id="restart">Restart game</button>

            <label>
                <input type="checkbox" id="autoSave">
                Auto save
            </label>
        </footer>
    </div>

    <div id="achievementPopup">
        <h3 id="achievementName"></h3>
        <p id="achievementDesc"></p>
    </div>

    <div id="floatingTextContainer"></div>

    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script src="save.js"></script>
    <script src="events.js"></script>
    <script src="main.js"></script>
</body>
</html>
